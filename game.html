<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sketchybook stage gameplay screen" />
    <title>Sketchybook Stage</title>
    <style>
      #page-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #f5ebcf;
        color: #3c2f1f;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        z-index: 9999;
      }
      #page-content {
        visibility: hidden;
        opacity: 0;
        transition: opacity 160ms ease;
      }
      html.js-ready #page-content {
        visibility: visible;
        opacity: 1;
      }
    </style>
    <script type="module" crossorigin src="/sketchybook/assets/game-D5dHDOLk.js"></script>
    <link rel="modulepreload" crossorigin href="/sketchybook/assets/paper-texture-MQPqaNuj.js">
    <link rel="stylesheet" crossorigin href="/sketchybook/assets/paper-texture-BVqGoVs_.css">
    <link rel="stylesheet" crossorigin href="/sketchybook/assets/game-CQJEpMuI.css">
  </head>
  <body>
    <div id="page-loader">Loading game…</div>
    <main id="page-content" class="game-page">
      <div class="page page-selection is-active">
        <section class="selection-screen" aria-label="Game selection screen">
          <div class="selection-grid" aria-label="Stage selection grid">
            <button class="stage-card" type="button" data-stage="1" aria-label="Stage 1">
              Stage 1
            </button>
            <button class="stage-card" type="button" data-stage="2" aria-label="Stage 2">
              Stage 2
            </button>
            <button class="stage-card" type="button" data-stage="3" aria-label="Stage 3">
              Stage 3
            </button>
            <button class="stage-card" type="button" data-stage="4" aria-label="Stage 4">
              Stage 4
            </button>
            <button class="stage-card" type="button" data-stage="5" aria-label="Stage 5">
              Stage 5
            </button>
            <button class="stage-card" type="button" data-stage="6" aria-label="Stage 6">
              Stage 6
            </button>
          </div>
        </section>
      </div>

      <div class="page page-play">
        <div class="game-board" id="game-board">
          <div class="game-grid"></div>
          <canvas id="game-canvas"></canvas>
        </div>
      </div>
    </main>
  </body>
</html>
