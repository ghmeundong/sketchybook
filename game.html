<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sketchybook stage gameplay screen" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Sketchybook Stage</title>
    <style>
      #page-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #f5ebcf;
        color: #3c2f1f;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-align: center;
        z-index: 9999;
      }
      #page-content {
        visibility: hidden;
        opacity: 0;
        transition: opacity 160ms ease;
      }
      html.js-ready #page-content {
        visibility: visible;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="page-loader">Loading game…</div>
    <main id="page-content" class="game-page">
      <div class="page page-selection is-active">
        <section class="selection-screen" aria-label="Game selection screen">
          <button
            class="game-exit-btn selection-exit-btn"
            type="button"
            data-back-home-button
            aria-label="Back to start screen"
          >
            <span class="selection-back-button__icon" data-back-home-icon></span>
          </button>
          <h1 class="brand-title selection-screen-title">SKETCHYBOOK</h1>
          <div class="selection-stage-shell">
            <button
              class="selection-nav-btn selection-nav-btn--prev"
              type="button"
              data-stage-page="prev"
              aria-label="Show previous stages"
            ></button>
            <div class="selection-grid" aria-label="Stage selection grid">
              <button class="stage-card" type="button" data-stage="1" aria-label="Stage 1">
                Stage 1
              </button>
              <button class="stage-card" type="button" data-stage="2" aria-label="Stage 2">
                Stage 2
              </button>
              <button class="stage-card" type="button" data-stage="3" aria-label="Stage 3">
                Stage 3
              </button>
              <button class="stage-card" type="button" data-stage="4" aria-label="Stage 4">
                Stage 4
              </button>
              <button class="stage-card" type="button" data-stage="5" aria-label="Stage 5">
                Stage 5
              </button>
              <button class="stage-card" type="button" data-stage="6" aria-label="Stage 6">
                Stage 6
              </button>
              <button class="stage-card" type="button" data-stage="7" aria-label="Stage 7">
                Stage 7
              </button>
              <button class="stage-card" type="button" data-stage="8" aria-label="Stage 8">
                Stage 8
              </button>
              <button class="stage-card" type="button" data-stage="9" aria-label="Stage 9">
                Stage 9
              </button>
              <button class="stage-card" type="button" data-stage="10" aria-label="Stage 10">
                Stage 10
              </button>
              <button class="stage-card" type="button" data-stage="11" aria-label="Stage 11">
                Stage 11
              </button>
              <button class="stage-card" type="button" data-stage="12" aria-label="Stage 12">
                Stage 12
              </button>
              <button class="stage-card" type="button" data-stage="13" aria-label="Stage 13">
                Stage 13
              </button>
              <button class="stage-card" type="button" data-stage="14" aria-label="Stage 14">
                Stage 14
              </button>
              <button class="stage-card" type="button" data-stage="15" aria-label="Stage 15">
                Stage 15
              </button>
              <button class="stage-card" type="button" data-stage="16" aria-label="Stage 16">
                Stage 16
              </button>
              <button class="stage-card" type="button" data-stage="17" aria-label="Stage 17">
                Stage 17
              </button>
              <button class="stage-card" type="button" data-stage="18" aria-label="Stage 18">
                Stage 18
              </button>
              <button class="stage-card" type="button" data-stage="19" aria-label="Stage 19">
                Stage 19
              </button>
              <button class="stage-card" type="button" data-stage="20" aria-label="Stage 20">
                Stage 20
              </button>
              <button class="stage-card" type="button" data-stage="21" aria-label="Stage 21">
                Stage 21
              </button>
              <button class="stage-card" type="button" data-stage="22" aria-label="Stage 22">
                Stage 22
              </button>
              <button class="stage-card" type="button" data-stage="23" aria-label="Stage 23">
                Stage 23
              </button>
              <button class="stage-card" type="button" data-stage="24" aria-label="Stage 24">
                Stage 24
              </button>
              <button class="stage-card" type="button" data-stage="25" aria-label="Stage 25">
                Stage 25
              </button>
              <button class="stage-card" type="button" data-stage="26" aria-label="Stage 26">
                Stage 26
              </button>
              <button class="stage-card" type="button" data-stage="27" aria-label="Stage 27">
                Stage 27
              </button>
              <button class="stage-card" type="button" data-stage="28" aria-label="Stage 28">
                Stage 28
              </button>
              <button class="stage-card" type="button" data-stage="29" aria-label="Stage 29">
                Stage 29
              </button>
              <button class="stage-card" type="button" data-stage="30" aria-label="Stage 30">
                Stage 30
              </button>
            </div>
            <button
              class="selection-nav-btn selection-nav-btn--next"
              type="button"
              data-stage-page="next"
              aria-label="Show next stages"
            ></button>
          </div>
        </section>
      </div>

      <div class="page page-play">
        <div class="game-board" id="game-board">
          <div class="game-grid"></div>
          <canvas id="game-canvas"></canvas>
        </div>
      </div>
    </main>
    <script type="module" src="./src/game/main.js"></script>
  </body>
</html>
