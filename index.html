<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sketchybook main screen with a hand-drawn style start experience."
    />
    <title>Sketchybook</title>
  </head>
  <body>
    <main>
      <div id="book" class="book">
        <div class="page page-start">
          <section class="start-screen" aria-label="Game start screen">
            <div class="title-stack">
              <h1 class="brand-title">SKETCHYBOOK</h1>
              <p class="game-title" data-start-button>Game Start</p>
            </div>
          </section>
        </div>
        <div class="page page-selection">
          <section class="selection-screen" aria-label="Game selection screen">
            <div class="selection-grid" aria-label="Stage selection grid">
              <button class="stage-card" type="button" aria-label="Stage 1">Stage 1</button>
              <button class="stage-card" type="button" aria-label="Stage 2">Stage 2</button>
              <button class="stage-card" type="button" aria-label="Stage 3">Stage 3</button>
              <button class="stage-card" type="button" aria-label="Stage 4">Stage 4</button>
              <button class="stage-card" type="button" aria-label="Stage 5">Stage 5</button>
              <button class="stage-card" type="button" aria-label="Stage 6">Stage 6</button>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
