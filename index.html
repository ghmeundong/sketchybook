<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sketchybook main screen with a hand-drawn style start experience."
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Sketchybook</title>
    <style>
      #page-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #f5ebcf;
        color: #3c2f1f;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-align: center;
        z-index: 9999;
      }
      #page-content {
        visibility: hidden;
        opacity: 0;
        transition: opacity 160ms ease;
      }
      html.js-ready #page-content {
        visibility: visible;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="page-loader">Loading Sketchybook…</div>
    <main id="page-content">
      <div id="book" class="book">
        <div class="page page-start is-active">
          <section class="start-screen" aria-label="Game start screen">
            <div class="start-screen-actions">
              <button
                class="settings-toggle game-exit-btn"
                type="button"
                data-settings-toggle
                aria-expanded="false"
                aria-controls="start-settings-panel"
                aria-label="Open settings"
              ></button>
              <div class="settings-panel" id="start-settings-panel" hidden>
                <p class="settings-panel-title">Settings</p>
                <div class="settings-option">
                  <div class="settings-option-text">
                    <strong>Challenge mode:</strong>
                    <span>draw only one line, and no clicks</span>
                  </div>
                  <button
                    class="settings-toggle-switch"
                    type="button"
                    data-challenge-mode-toggle
                    aria-pressed="false"
                  >
                    <span class="settings-toggle-switch-thumb"></span>
                  </button>
                </div>
                <button class="settings-panel-close" type="button" data-settings-close>
                  Close
                </button>
              </div>
            </div>
            <div class="title-stack">
              <h1 class="brand-title">SKETCHYBOOK</h1>
              <button class="game-title" type="button" data-start-button>Loading...</button>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
