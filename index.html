<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sketchybook main screen with a hand-drawn style start experience."
    />
    <title>Sketchybook</title>
    <style>
      #page-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #f5ebcf;
        color: #3c2f1f;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        z-index: 9999;
      }
      #page-content {
        visibility: hidden;
        opacity: 0;
        transition: opacity 160ms ease;
      }
      html.js-ready #page-content {
        visibility: visible;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="page-loader">Loading Sketchybook…</div>
    <main id="page-content">
      <div id="book" class="book">
        <div class="page page-start is-active">
          <section class="start-screen" aria-label="Game start screen">
            <div class="title-stack">
              <h1 class="brand-title">Loading Sketchybook…</h1>
              <button class="game-title" type="button" data-start-button>Loading...</button>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
